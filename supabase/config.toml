# USki — Supabase CLI Local Development Config
# Start with: supabase start
# Stop with:  supabase stop

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323
# Open Supabase Studio at http://localhost:54323

# Email catcher for dev mode
# Supabase CLI <1.164 uses [inbucket], newer versions use [mailpit]
# Pick the one matching your CLI version. Both catch OTP emails locally.
[inbucket]
enabled = true
port = 54324
# Open email catcher at http://localhost:54324 to see OTP codes

# [mailpit]
# enabled = true
# port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Code-only emails: every auth mail shows ONLY the 6-digit {{ .Token }},
# no magic link, no "Confirm your email" copy.
[auth.email.template.confirmation]
subject = "Your USki sign-in code"
content_path = "./supabase/templates/otp.html"

[auth.email.template.magic_link]
subject = "Your USki sign-in code"
content_path = "./supabase/templates/otp.html"

[auth.email.template.recovery]
subject = "Your USki sign-in code"
content_path = "./supabase/templates/otp.html"

[auth.email.template.email_change]
subject = "Your USki verification code"
content_path = "./supabase/templates/otp.html"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false
# client_id = ""
# secret = ""
