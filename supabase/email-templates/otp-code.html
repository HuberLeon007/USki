<!--
  USki sign-in code email.

  WHERE THIS GOES (one-time, in the Supabase dashboard — cannot be set from code):
    Supabase → Authentication → Emails → Templates → "Magic Link"
      1. Subject:  Your USki sign-in code
      2. Message body: paste the HTML below (replace the default).
      3. Save.

  The default Supabase template only sends a {{ .ConfirmationURL }} link. This
  one shows the 6-digit {{ .Token }} the app's OTP screen expects (and keeps the
  link as a fallback). Variables {{ .Token }} / {{ .ConfirmationURL }} are filled
  by Supabase at send time — leave them exactly as written.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f7;margin:0;padding:24px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;background-color:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #ececf1;">
        <!-- Brand bar -->
        <tr>
          <td align="center" bgcolor="#7c3aed" style="background-color:#7c3aed;padding:28px 24px;">
            <span style="font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:bold;color:#ffffff;letter-spacing:-0.5px;">USki</span>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:36px 32px 8px 32px;">
            <h1 style="margin:0 0 8px 0;font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:26px;color:#18181b;font-weight:bold;">Your sign-in code</h1>
            <p style="margin:0 0 24px 0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:22px;color:#52525b;">
              Enter this 6-digit code in the app to sign in. It expires shortly and can only be used once.
            </p>
          </td>
        </tr>

        <!-- The code -->
        <tr>
          <td align="center" style="padding:0 32px 28px 32px;">
            <div style="display:inline-block;background-color:#f4f0ff;border:1px solid #e3d9ff;border-radius:12px;padding:18px 28px;">
              <span style="font-family:'Courier New',Courier,monospace;font-size:36px;font-weight:bold;letter-spacing:10px;color:#7c3aed;">{{ .Token }}</span>
            </div>
          </td>
        </tr>

        <!-- Fallback link -->
        <tr>
          <td style="padding:0 32px 32px 32px;border-top:1px solid #f0f0f4;">
            <p style="margin:24px 0 0 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:20px;color:#71717a;">
              Prefer a link? <a href="{{ .ConfirmationURL }}" style="color:#7c3aed;text-decoration:underline;">Sign in here</a>. If you didn't request this, you can safely ignore this email.
            </p>
          </td>
        </tr>
      </table>

      <p style="margin:16px 0 0 0;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#a1a1aa;">USki · Spaced-repetition flashcards</p>
    </td>
  </tr>
</table>
