<!doctype html>
<html lang="en">
  <body style="margin:0;background:#0b0b0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0b0b0f;padding:40px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:420px;background:#15151c;border:1px solid #26262f;border-radius:16px;padding:36px 32px;">
            <tr>
              <td align="center" style="padding-bottom:14px;">
                <img src="https://uski.huberleon.com/logo.png" alt="USki" width="56" style="display:block;width:56px;height:auto;border:0;outline:none;text-decoration:none;border-radius:12px;" />
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:8px;font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#ffffff;">
                <span style="color:#7c5cff;">US</span><span style="color:#ffffff;">ki</span>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:24px;font-size:14px;color:#9b9ba7;">
                Your one-time sign-in code
              </td>
            </tr>
            <tr>
              <td align="center">
                <div style="display:inline-block;background:#0b0b0f;border:1px solid #2e2e3a;border-radius:12px;padding:18px 28px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:34px;font-weight:700;letter-spacing:10px;color:#ffffff;">
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-top:24px;font-size:12px;line-height:1.6;color:#6b6b78;">
                Enter this code to sign in. It expires shortly.<br />
                If you didn't request it, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
