services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Supabase runs on the host (supabase CLI), reached via host.docker.internal.
      - SUPABASE_URL=http://host.docker.internal:54321
      # Browser-facing URL = token issuer (what the client's JWT carries).
      - SUPABASE_PUBLIC_URL=http://127.0.0.1:54321
      # Same compose network -> reach sibling services by name.
      - RATE_LIMIT_REDIS_URL=redis://redis:6379
      # AI provider: local Ollama (sibling service). Embeddings reuse this URL.
      - AI_BASE_URL=http://ollama:11434/v1
      # Chat model (tunable via .env; default works out of the box in dev).
      - AI_MODEL=${AI_MODEL:-gemma3:4b}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src  # Hot-reload: code changes reflect instantly

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      # Browser runs on host, so it uses 127.0.0.1 (not host.docker.internal)
      - VITE_SUPABASE_URL=http://127.0.0.1:54321
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # API proxy target for Vite dev server (Docker -> host machine)
      - VITE_API_PROXY_TARGET=http://host.docker.internal:8000
      # HMR + file-watch polling (Windows/macOS Docker bind mounts emit no inotify)
      - DOCKER_ENV=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                 # Hot-reload: all source files
      - /app/node_modules               # Preserve node_modules from the image layer

  # ── Dev-only services (start with: docker compose --profile dev up) ──

  ollama:
    image: ollama/ollama:latest
    container_name: uski-ollama
    profiles:
      - dev
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Tuned for a 4 GB GPU (e.g. RTX 3050 Ti) + 32 GB RAM: keep the model
      # resident forever (no 5-min unload), modest parallelism + context so it
      # fits in VRAM (overflow spills to RAM). On a big GPU (4090) you can bump
      # OLLAMA_NUM_PARALLEL / OLLAMA_CONTEXT_LENGTH way up.
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_CONTEXT_LENGTH=8192
      - OLLAMA_FLASH_ATTENTION=1

  # One-shot: pulls the chat + embedding models into the ollama volume so the
  # assistant and RAG work after a plain `up`. Models persist in ollama_data,
  # so this is instant on subsequent runs. Exits when done.
  ollama-init:
    image: ollama/ollama:latest
    container_name: uski-ollama-init
    profiles:
      - dev
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AI_MODEL=${AI_MODEL:-gemma3:4b}
      - AI_EMBED_MODEL=${AI_EMBED_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "waiting for ollama..."
        until ollama list >/dev/null 2>&1; do sleep 2; done
        echo "pulling chat model: $${AI_MODEL}"
        ollama pull "$${AI_MODEL}"
        echo "pulling embedding model: $${AI_EMBED_MODEL}"
        ollama pull "$${AI_EMBED_MODEL}"
        echo "ollama models ready"
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: uski-redis
    profiles:
      - dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  ollama_data:
  redis_data:
